<!DOCTYPE html>
<html lang="de">
<head>
    <!--
    VORAUSSETZUNGEN (Google Chrome API):
    Damit die lokale KI (window.LanguageModel) funktioniert, müssen in Chrome folgende Flags gesetzt sein:
    1. chrome://flags/#prompt-api-for-gemini-nano (Enabled)
    2. chrome://flags/#optimization-guide-on-device-model (Enabled BypassPerfRequirement)
    3. Browser danach vollständig neu starten.
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lokaler KI-Chat (Gemini Nano) - Ultimate Edition (Wartung 1)</title>
    <style>
        /* === Basis & Layout === */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; color: #e0e0e0; margin: 0;
            display: flex; height: 100vh; overflow: hidden;
        }
        #app-layout { display: flex; width: 100%; height: 100%; }
        
        /* === Debug Terminal === */
        #debug-terminal { position: absolute; top: 0; left: 0; width: 100%; height: 40%; background: rgba(0, 0, 0, 0.95); color: #0f0; font-family: monospace; z-index: 10000; display: none; flex-direction: column; border-bottom: 2px solid #444; }
        #debug-terminal-header { padding: 8px 15px; background: #222; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; font-weight: bold; color: #fff; }
        #debug-log { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 0.85em; display: flex; flex-direction: column; gap: 3px; }
        .log-error { color: #ff5252; } .log-warn { color: #fbc02d; } .log-info { color: #4caf50; }

        /* === Sidebar (Multi-Session) === */
        #sidebar {
            width: 260px; background: #181818; border-right: 1px solid #333;
            display: flex; flex-direction: column; transition: margin-left 0.3s ease;
            flex-shrink: 0; z-index: 10;
        }
        #sidebar.hidden { margin-left: -260px; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; }
        .new-chat-full-btn {
            width: 100%; padding: 10px; background: #1a73e8; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .new-chat-full-btn:hover { background: #1557b0; }
        #session-list { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .session-item {
            padding: 10px; background: #222; border-radius: 5px; cursor: pointer;
            font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            border: 1px solid transparent; transition: 0.2s;
        }
        .session-item:hover { background: #2a2a2a; }
        .session-item.active { background: #2a3b5c; border-color: #1a73e8; }
        .session-item-delete { float: right; color: #ff5252; background: none; border: none; cursor: pointer; display: none; }
        .session-item:hover .session-item-delete { display: inline-block; }

        /* === Haupt-Chatbereich === */
        #chat-container {
            flex-grow: 1; display: flex; flex-direction: column; position: relative;
            background: #1e1e1e; min-width: 0;
        }
        #drag-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 115, 232, 0.9); color: white; font-size: 2em; font-weight: bold;
            display: none; justify-content: center; align-items: center;
            z-index: 9999; border: 4px dashed #fff; box-sizing: border-box;
        }
        
        /* === Header & Context Bar === */
        #chat-header {
            background-color: #1a73e8; color: white; padding: 12px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .header-title-area { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 1.1em; }
        .header-actions { display: flex; gap: 10px; }
        .icon-btn {
            background: transparent; border: 1px solid rgba(255,255,255,0.3);
            color: white; border-radius: 5px; padding: 5px 10px;
            cursor: pointer; font-size: 0.9em; transition: 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .icon-btn:hover { background: rgba(255,255,255,0.2); }
        #context-bar-container { width: 100%; height: 4px; background: #333; }
        #context-bar-fill { width: 0%; height: 100%; background: #4caf50; transition: width 0.3s, background-color 0.3s; }
        
        #compress-btn {
            background: #fbc02d; color: #000; font-weight: bold; border: none; padding: 8px 15px;
            cursor: pointer; font-size: 0.85em; display: none; justify-content: center; align-items: center;
            transition: 0.2s; border-radius: 0 0 5px 5px; margin: 0 auto; width: max-content;
        }
        #compress-btn:hover { background: #f9a825; }

        /* === Settings Panel === */
        #settings-panel { background: #2a2a2a; padding: 10px 15px; border-bottom: 1px solid #333; display: none; }
        #system-prompt {
            width: 100%; box-sizing: border-box; padding: 10px; background-color: #1e1e1e; color: #e0e0e0;
            border: 1px solid #444; border-radius: 5px; outline: none; font-family: inherit; resize: vertical; min-height: 40px;
        }

        /* === Chat Verlauf === */
        #chat-box { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .wrapper-user { align-self: flex-end; align-items: flex-end; }
        .wrapper-ai { align-self: flex-start; align-items: flex-start; }
        .message { padding: 10px 15px; border-radius: 15px; line-height: 1.5; word-wrap: break-word; width: 100%; box-sizing: border-box; }
        .user-msg { background-color: #1a73e8; color: #ffffff; border-bottom-right-radius: 2px; white-space: pre-wrap; }
        .ai-msg { background-color: #333333; color: #e0e0e0; border-bottom-left-radius: 2px; }
        
        .edit-area {
            width: 100%; box-sizing: border-box; padding: 10px; background: #222; color: #fff;
            border: 1px solid #1a73e8; border-radius: 5px; resize: vertical; font-family: inherit; margin-bottom: 5px;
        }
        .save-edit-btn { background: #4caf50; color: white; border: none; padding: 5px 15px; border-radius: 3px; cursor: pointer; }
        
        /* === Native Syntax Highlighting === */
        .ai-msg strong { color: #fff; } .ai-msg em { color: #ccc; } .ai-msg p { margin: 0 0 10px 0; } .ai-msg p:last-child { margin: 0; }
        .code-wrap { background: #111; border-radius: 5px; border: 1px solid #444; margin: 10px 0; overflow: hidden; }
        .code-header { background: #222; padding: 5px 10px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; font-size: 0.8em; color: #aaa; }
        .code-actions { display: flex; gap: 10px; }
        .code-wrap pre { margin: 0; padding: 10px; overflow-x: auto; }
        .code-wrap code, .inline-code { color: #e0e0e0; font-family: monospace; }
        .inline-code { background: #111; padding: 2px 4px; border-radius: 3px; border: 1px solid #444; color: #ffb74d;}
        .hl-keyword { color: #c678dd; } .hl-string { color: #98c379; } .hl-comment { color: #5c6370; font-style: italic; } .hl-number { color: #d19a66; }  
        .code-output-frame { width: 100%; height: 250px; border: none; background: #fff; border-radius: 0 0 5px 5px; display: none; }
        
        .sys-msg { background-color: transparent; color: #888888; align-self: center; font-size: 0.85em; font-style: italic; text-align: center; }
        .sys-msg-context { text-align: left; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 5px; white-space: pre-wrap; font-family: monospace; width: 90%; border: 1px solid #333; }
        
        /* Msg Action Buttons */
        .msg-actions { display: flex; gap: 10px; margin-top: 5px; opacity: 0; transition: opacity 0.2s; }
        .message-wrapper:hover .msg-actions { opacity: 1; }
        .action-btn { background: transparent; border: none; color: #aaa; font-size: 0.8em; cursor: pointer; padding: 0; display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { color: #fff; }
        
        /* === Quick Prompts & Input === */
        #quick-prompts { display: flex; gap: 8px; padding: 10px 15px; background: #222; border-top: 1px solid #333; overflow-x: auto; white-space: nowrap; }
        .quick-btn { background: #333; color: #ccc; border: 1px solid #444; border-radius: 15px; padding: 5px 12px; font-size: 0.85em; cursor: pointer; transition: 0.2s; }
        .quick-btn:hover { background: #1a73e8; color: white; border-color: #1a73e8; }
        
        #input-container { display: flex; padding: 15px; background: #1e1e1e; border-top: 1px solid #333; align-items: flex-end; }
        #user-input { flex-grow: 1; padding: 12px; background-color: #2c2c2c; color: #e0e0e0; border: 1px solid #444444; border-radius: 10px; outline: none; font-size: 1em; font-family: inherit; resize: none; min-height: 20px; max-height: 150px; overflow-y: auto; }
        #user-input:focus { border-color: #1a73e8; }
        .btn { color: white; border: none; padding: 12px 20px; margin-left: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; height: 44px; }
        #mic-btn { background-color: #444; margin-left: 10px; }
        #mic-btn.recording { background-color: #d32f2f; animation: pulse 1.5s infinite; }
        #send-btn { background-color: #1a73e8; }
        #send-btn:disabled { background-color: #444444; color: #777777; cursor: not-allowed; }
        #stop-btn { background-color: #d32f2f; display: none; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="app-layout">
        <div id="debug-terminal">
            <div id="debug-terminal-header">
                <span>🛠️ System Debug Terminal (Strg+D)</span>
                <button id="export-log-btn" class="action-btn" style="color: white; border: 1px solid #555; padding: 3px 8px; border-radius: 3px;">Logs exportieren</button>
            </div>
            <div id="debug-log"></div>
        </div>

        <div id="sidebar">
            <div class="sidebar-header"><button class="new-chat-full-btn" id="sidebar-new-btn">➕ Neuer Chat</button></div>
            <div id="session-list"></div>
        </div>

        <div id="chat-container">
            <div id="drag-overlay">Datei hier ablegen</div>
            
            <div id="chat-header">
                <div class="header-title-area">
                    <button id="toggle-sidebar-btn" class="icon-btn" title="Seitenleiste (Strg+B)">☰</button>
                    <span>Gemini Nano Lokal</span>
                </div>
                <div class="header-actions">
                    <button id="toggle-settings-btn" class="icon-btn" title="Persona/System-Prompt">⚙️ Persona</button>
                    <button id="import-btn" class="icon-btn" title="Chat laden (Strg+O)">📂</button>
                    <input type="file" id="import-file" accept=".txt" style="display: none;">
                    <button id="export-btn" class="icon-btn" title="Chat speichern (Strg+S)">💾</button>
                </div>
            </div>
            
            <div id="context-bar-container" title="Auslastung des KI-Gedächtnisses"><div id="context-bar-fill"></div></div>
            <button id="compress-btn">🧠 Speicher optimieren (Komprimieren)</button>
            <div id="settings-panel"><textarea id="system-prompt" rows="2" placeholder="Optional: System-Prompt eingeben."></textarea></div>
            <div id="chat-box"></div>

            <div id="quick-prompts">
                <button class="quick-btn" data-action="Zusammenfassen">Zusammenfassen</button>
                <button class="quick-btn" data-action="Code erklären">Code erklären</button>
                <button class="quick-btn" data-action="Fehler beheben">Fehler beheben</button>
                <button class="quick-btn" data-action="Kritisch hinterfragen">Kritisch hinterfragen</button>
            </div>

            <div id="input-container">
                <textarea id="user-input" rows="1" placeholder="Prompt, URL oder Datei eingeben..." disabled></textarea>
                <button id="mic-btn" class="btn" title="Spracheingabe (Strg+M)" disabled>🎤</button>
                <button id="send-btn" class="btn" disabled>Senden</button>
                <button id="stop-btn" class="btn">Stopp</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * @file Lokaler KI-Chat (Ultimate Edition)
         * @description Vollständig refaktorierte, offline-fähige KI-Chat-Anwendung mit Gemini Nano.
         * Behebt Performanz-Engpässe (Layout-Thrashing) und implementiert saubere JSDoc-Dokumentation.
         */

        /**
         * Globale Systemkonfiguration und Magic Strings.
         * @constant {Object}
         */
        const CONFIG = {
            SCROLL_THRESHOLD: 30, 
            FILE_PREFIX: "--- Lokaler KI-Chat Export ---",
            MAX_WEBPAGE_CHARS: 3500,
            MAX_CONTEXT_CHARS: 12000, 
            SAFE_INIT_CHARS: 9000, // Anti-Crash: Max. Zeichen für den KI-Init-Prompt
            STORAGE_SESSIONS_KEY: "nano_chat_sessions_v4", // Versionssprung für saubere Migration
            MARKERS: { SYS: "---[System]---", USR: "---[Du]---", AI: "---[KI]---" },
            UI: {
                BTN_LOADING: "KI lädt...",
                BTN_SEND: "Senden",
                BTN_ERROR: "Fehler",
                BTN_COMPRESS: "Komprimiere..."
            }
        };

        /**
         * Hauptklasse der KI-Chat-Anwendung.
         * Kapselt die Präsentationslogik, API-Kommunikation und Datenverwaltung.
         */
        class AIChatApp {
            constructor() {
                /** @type {Object<string, HTMLElement>} DOM-Referenzen */
                this.dom = {
                    sidebar: document.getElementById('sidebar'), sessionList: document.getElementById('session-list'),
                    chatBox: document.getElementById('chat-box'), userInput: document.getElementById('user-input'),
                    sendBtn: document.getElementById('send-btn'), stopBtn: document.getElementById('stop-btn'),
                    micBtn: document.getElementById('mic-btn'), sysPrompt: document.getElementById('system-prompt'),
                    settingsPanel: document.getElementById('settings-panel'), importFile: document.getElementById('import-file'),
                    contextFill: document.getElementById('context-bar-fill'), dragOverlay: document.getElementById('drag-overlay'),
                    debugTerminal: document.getElementById('debug-terminal'), debugLog: document.getElementById('debug-log'),
                    exportLogBtn: document.getElementById('export-log-btn'), compressBtn: document.getElementById('compress-btn')
                };

                /** @type {Object} Gekapselter Anwendungsstatus */
                this.state = {
                    session: null, 
                    isAborted: false, 
                    isAutoScrollActive: true, 
                    isRecording: false,
                    pendingFileContext: null, 
                    sessionsData: [], 
                    currentSessionId: null, 
                    logs: [],
                    resizeScheduled: false // Verhindert Layout-Thrashing beim Tippen
                };

                this.setupGlobalErrorHandlers();
                this.setupSpeechRecognition();
                this.bindEvents();
                this.loadSessionsFromStorage();
            }

            // ==========================================
            // DEBUG ENGINE
            // ==========================================
            
            /**
             * Fängt Laufzeit-Fehler global ab und leitet sie ans lokale Terminal weiter.
             */
            setupGlobalErrorHandlers() {
                window.onerror = (msg, src, lineno, colno, err) => { this.debug('ERROR', `Crash: ${msg}`, err?.stack); return false; };
                window.addEventListener('unhandledrejection', (e) => this.debug('ERROR', `Promise Rejection: ${e.reason}`, e.reason?.stack));
            }
            
            /**
             * Protokolliert Systemereignisse.
             * @param {'INFO'|'WARN'|'ERROR'} level - Dringlichkeit
             * @param {string} message - Kernnachricht
             * @param {Object} [obj] - Optionale Zusatzdaten
             */
            debug(level, message, obj = null) {
                const ts = new Date().toISOString().split('T')[1].slice(0, -1);
                this.state.logs.push({ ts, level, message, obj });
                if (this.dom.debugLog) {
                    const div = document.createElement('div'); div.className = `log-${level.toLowerCase()}`;
                    div.textContent = `[${ts}] [${level}] ${message}` + (obj ? ` | ${JSON.stringify(obj)}` : '');
                    this.dom.debugLog.appendChild(div);
                    this.dom.debugLog.scrollTop = this.dom.debugLog.scrollHeight;
                }
            }

            toggleDebugTerminal() {
                const isHidden = this.dom.debugTerminal.style.display === 'none' || this.dom.debugTerminal.style.display === '';
                this.dom.debugTerminal.style.display = isHidden ? 'flex' : 'none';
            }

            exportLogs() {
                const logText = this.state.logs.map(l => `[${l.ts}] [${l.level}] ${l.message} ${l.obj ? JSON.stringify(l.obj) : ''}`).join('\n');
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([logText], { type: 'text/plain' }));
                a.download = `debug-log-${Date.now()}.log`; a.click();
            }

            // ==========================================
            // CORE: Unified AI Connection
            // ==========================================
            
            /**
             * Verbindet sich mit der KI. Nutzt einen Sliding-Window-Mechanismus (Sliding-Context),
             * um Out-of-Memory (OOM) Crashes bei massiven Chat-Historien zu verhindern.
             * @param {boolean} withHistory - Bestimmt, ob der alte Verlauf als Gedächtnis injiziert wird.
             */
            async connectToAI(withHistory = false) {
                this.debug('INFO', `Initialisiere KI. History-Modus: ${withHistory}`);
                
                if (this.state.session && typeof this.state.session.destroy === 'function') {
                    try { this.state.session.destroy(); this.debug('INFO', 'Alte Session zerstört.'); } catch (e) {}
                }
                this.state.session = null;
                
                this.dom.sendBtn.textContent = CONFIG.UI.BTN_LOADING;
                this.setUIState(false);

                try {
                    if (!window.LanguageModel) throw new Error("LanguageModel API (Gemini Nano) nicht im Browser gefunden. Flags prüfen.");
                    
                    const options = { expectedInputs: [{ type: 'text', languages: ['en'] }], expectedOutputs: [{ type: 'text', languages: ['en'] }] };
                    let finalSystemPrompt = this.dom.sysPrompt.value.trim() ? `System-Anweisung: ${this.dom.sysPrompt.value.trim()}\n\n` : "";

                    if (withHistory) {
                        const wrappers = Array.from(this.dom.chatBox.querySelectorAll('.message-wrapper'));
                        let historyText = "";
                        let currentLength = finalSystemPrompt.length;
                        
                        for (let i = wrappers.length - 1; i >= 0; i--) {
                            const role = wrappers[i].classList.contains('wrapper-user') ? "User" : "KI";
                            const msgChunk = `${role}: ${wrappers[i].dataset.rawText}\n\n`;
                            
                            if (currentLength + msgChunk.length > CONFIG.SAFE_INIT_CHARS) {
                                this.debug('WARN', 'Token-Limit erreicht. Ältere Nachrichten werden für die Session temporär vergessen.');
                                break;
                            }
                            historyText = msgChunk + historyText;
                            currentLength += msgChunk.length;
                        }
                        
                        if (historyText) finalSystemPrompt += `Bisheriger Chatverlauf:\n${historyText}`;
                    }

                    if (finalSystemPrompt) options.systemPrompt = finalSystemPrompt;
                    this.debug('INFO', `Sende System-Prompt. Länge: ${finalSystemPrompt.length} Zeichen.`);

                    const availability = await LanguageModel.availability(options);
                    if (availability !== 'unavailable') {
                        this.state.session = await LanguageModel.create(options);
                        this.debug('INFO', 'KI-Sitzung erfolgreich erstellt.');
                        this.dom.sendBtn.textContent = CONFIG.UI.BTN_SEND;
                        this.setUIState(true);
                    } else {
                        throw new Error("KI-Modell meldet Status: unavailable");
                    }
                } catch (error) {
                    this.debug('ERROR', 'Verbindungsfehler', error.message);
                    this.addSysMessage("Fehler beim Verbindungsaufbau: " + error.message);
                    this.dom.sendBtn.textContent = CONFIG.UI.BTN_ERROR;
                }
            }

            // ==========================================
            // MULTI-SESSION & STORAGE
            // ==========================================
            
            /** Lädt Sitzungen aus dem LocalStorage. */
            loadSessionsFromStorage() {
                try {
                    const data = localStorage.getItem(CONFIG.STORAGE_SESSIONS_KEY);
                    if (data) this.state.sessionsData = JSON.parse(data);
                } catch(e) { this.debug('ERROR', 'Ladefehler Storage', e.message); }

                if (this.state.sessionsData.length > 0) this.switchSession(this.state.sessionsData[0].id);
                else this.createNewSession();
                this.renderSidebar();
            }

            /** Speichert die aktuelle Ansicht sicher im LocalStorage (Quota-Protection). */
            saveSessionsToStorage() {
                if (this.state.currentSessionId) {
                    const idx = this.state.sessionsData.findIndex(s => s.id === this.state.currentSessionId);
                    if (idx > -1) {
                        this.state.sessionsData[idx].data = this.generateExportString();
                        const firstMsg = this.dom.chatBox.querySelector('.wrapper-user');
                        if (firstMsg) this.state.sessionsData[idx].title = (firstMsg.dataset.rawText || "").substring(0, 30).replace(/\n/g, ' ') + "...";
                    }
                }
                try {
                    localStorage.setItem(CONFIG.STORAGE_SESSIONS_KEY, JSON.stringify(this.state.sessionsData));
                } catch (e) {
                    this.debug('ERROR', 'Storage Limit', e.message);
                    this.addSysMessage("⚠️ Warnung: Speicher voll. Bitte alte Chats löschen.");
                }
                this.renderSidebar();
                this.updateContextBar();
            }

            renderSidebar() {
                this.dom.sessionList.innerHTML = '';
                this.state.sessionsData.forEach(s => {
                    const div = document.createElement('div');
                    div.className = `session-item ${s.id === this.state.currentSessionId ? 'active' : ''}`;
                    div.textContent = s.title || "Neuer Chat";
                    
                    const delBtn = document.createElement('button'); delBtn.className = 'session-item-delete'; delBtn.textContent = '✖';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        this.state.sessionsData = this.state.sessionsData.filter(x => x.id !== s.id);
                        if (this.state.currentSessionId === s.id) this.createNewSession(); else this.saveSessionsToStorage();
                    };
                    div.appendChild(delBtn); div.onclick = () => this.switchSession(s.id);
                    this.dom.sessionList.appendChild(div);
                });
            }

            async createNewSession() {
                if(this.state.currentSessionId) this.saveSessionsToStorage();
                const newId = Date.now().toString();
                this.state.sessionsData.unshift({ id: newId, title: "Neuer Chat", data: CONFIG.FILE_PREFIX + "\n" });
                await this.switchSession(newId);
            }

            async switchSession(id) {
                if (this.state.currentSessionId) this.saveSessionsToStorage();
                this.state.currentSessionId = id;
                const sessionObj = this.state.sessionsData.find(s => s.id === id);
                if (sessionObj) {
                    this.dom.chatBox.innerHTML = '';
                    await this.loadFromString(sessionObj.data, false);
                    await this.connectToAI(true); 
                }
                this.renderSidebar();
            }

            // ==========================================
            // UI HELPER (Performance Optimizations)
            // ==========================================
            
            /**
             * Performanz-Fix (Verhindert Layout-Thrashing):
             * Anstatt `scrollHeight` auszulesen, was den Browser zu synchronen Layout-Berechnungen 
             * in der Mitte des Render-Zyklus zwingt, setzen wir einen willkürlich gigantischen Wert.
             * @param {boolean} force - Überschreibt Auto-Scroll-Bedingungen.
             */
            scrollToBottom(force = false) { 
                if (force || this.state.isAutoScrollActive) {
                    this.dom.chatBox.scrollTop = 1e9; // Reflow-sicheres Auto-Scroll
                }
            }
            
            /**
             * Performanz-Fix (Debouncing / Throttling):
             * Drosselt die Höhenanpassung auf maximal 1 Ausführung pro Browser-Frame (60fps).
             * Verhindert CPU-Spikes beim schnellen Tippen.
             * @param {boolean} clear - Löscht das Input-Feld komplett.
             */
            triggerInputResize(clear = false) {
                if (clear) this.dom.userInput.value = '';
                if (!this.state.resizeScheduled) {
                    this.state.resizeScheduled = true;
                    requestAnimationFrame(() => {
                        this.dom.userInput.style.height = 'auto';
                        this.dom.userInput.style.height = (this.dom.userInput.scrollHeight) + 'px';
                        if(this.dom.userInput.value === '') this.dom.userInput.style.height = 'auto';
                        this.state.resizeScheduled = false;
                    });
                }
            }

            setUIState(isReady, isGenerating = false) {
                this.dom.userInput.disabled = !isReady;
                this.dom.sendBtn.disabled = !isReady;
                if(this.recognition) this.dom.micBtn.disabled = !isReady;
                this.dom.sendBtn.style.display = isGenerating ? 'none' : 'block';
                this.dom.stopBtn.style.display = isGenerating ? 'block' : 'none';
            }

            updateContextBar() {
                let charCount = 0;
                this.dom.chatBox.querySelectorAll('.message-wrapper, .sys-msg-context').forEach(w => charCount += (w.dataset.rawText || w.textContent || "").length);
                const percentage = Math.min(100, (charCount / CONFIG.MAX_CONTEXT_CHARS) * 100);
                this.dom.contextFill.style.width = percentage + '%';
                this.dom.contextFill.style.backgroundColor = percentage > 90 ? '#d32f2f' : percentage > 70 ? '#fbc02d' : '#4caf50'; 
                
                if (this.dom.compressBtn) {
                    this.dom.compressBtn.style.display = percentage > 70 ? 'flex' : 'none';
                }
            }

            // ==========================================
            // FEATURE: Context Compression
            // ==========================================
            
            /**
             * Komprimiert ältere Nachrichten zu einer dichten Zusammenfassung,
             * um Token-Speicher für die Gemini-Sitzung freizugeben.
             */
            async compressHistory() {
                this.debug('INFO', 'Starte smarte Kontext-Komprimierung...');
                const wrappers = Array.from(this.dom.chatBox.querySelectorAll('.message-wrapper, .sys-msg-context'));
                const keepCount = 4;
                if (wrappers.length <= keepCount) {
                    this.addSysMessage("Der Chat ist noch zu kurz für eine sinnvolle Komprimierung.");
                    return;
                }

                const oldWrappers = wrappers.slice(0, wrappers.length - keepCount);
                let textToCompress = "";
                oldWrappers.forEach(w => {
                    const role = w.classList.contains('wrapper-user') ? "User: " : (w.classList.contains('sys-msg-context') ? "System: " : "KI: ");
                    textToCompress += role + (w.dataset.rawText || w.textContent) + "\n\n";
                });

                if (textToCompress.length > CONFIG.SAFE_INIT_CHARS) {
                    textToCompress = textToCompress.substring(textToCompress.length - CONFIG.SAFE_INIT_CHARS);
                }

                this.setUIState(false);
                this.dom.sendBtn.textContent = CONFIG.UI.BTN_COMPRESS;
                this.dom.compressBtn.style.display = 'none';

                try {
                    const summarySession = await LanguageModel.create({
                        systemPrompt: "Du bist ein KI-Archivar. Fasse diesen älteren Chat-Verlauf extrem präzise zusammen. Behalte alle wichtigen Fakten, Konzepte und Code-Snippets."
                    });
                    const summary = await summarySession.prompt("Fasse diesen Verlauf zusammen:\n\n" + textToCompress);
                    summarySession.destroy(); 

                    oldWrappers.forEach(w => w.remove());

                    const archiveDiv = document.createElement('div');
                    archiveDiv.className = 'message sys-msg sys-msg-context';
                    archiveDiv.style.borderLeft = "4px solid #fbc02d";
                    archiveDiv.innerHTML = `<strong>🧠 Gedächtnis-Archiv:</strong><br><br>${this.parseMarkdown(summary)}`;
                    archiveDiv.dataset.rawText = `[Zusammenfassung der Vergangenheit]: ${summary}`;
                    this.dom.chatBox.prepend(archiveDiv);
                    
                    this.addSysMessage("✅ Alter Kontext wurde erfolgreich komprimiert. Speicher freigegeben.");
                    this.debug('INFO', 'Komprimierung erfolgreich abgeschlossen.');
                    
                    this.updateContextBar();
                    this.saveSessionsToStorage();
                } catch (error) {
                    this.debug('ERROR', 'Komprimierung fehlgeschlagen', error.message);
                    this.addSysMessage("❌ Fehler bei der Komprimierung: " + error.message);
                } finally {
                    this.dom.sendBtn.textContent = CONFIG.UI.BTN_SEND;
                    this.setUIState(true);
                    await this.connectToAI(true); 
                }
            }

            // ==========================================
            // GENERIERUNG & CHAT LOGIK
            // ==========================================
            async handleSend(isRegenerate = false) {
                const text = this.dom.userInput.value.trim();
                if (!text || !this.state.session) return;

                if (!isRegenerate) this.addMessage(text, 'user-msg');
                this.triggerInputResize(true);
                this.setUIState(false, true); 
                this.state.isAborted = false;

                let finalPrompt = text;
                if (this.state.pendingFileContext) {
                    finalPrompt = `${this.state.pendingFileContext}---\nAufgabe:\n${text}`;
                    this.state.pendingFileContext = null; 
                } else {
                    const urls = text.match(/(https?:\/\/[^\s]+)/g);
                    if (urls && urls.length > 0) {
                        this.addSysMessage(`Lade Inhalt von: ${urls[0]} ...`);
                        const pageText = await this.fetchWebpageText(urls[0]);
                        if (pageText) { this.addSysMessage("✅ Text extrahiert"); finalPrompt = `Kontext (${urls[0]}):\n\n${pageText}\n\n---\nAufgabe:\n${text}`; }
                    }
                }

                const aiTextNode = this.addMessage("...", "ai-msg");
                try {
                    await this.streamResponse(finalPrompt, aiTextNode);
                } catch (error) {
                    this.debug('ERROR', 'Stream Failed', error.message);
                    aiTextNode.innerHTML = this.parseMarkdown("Fehler: " + error.message);
                } finally {
                    this.setUIState(true); this.dom.userInput.focus(); this.saveSessionsToStorage();
                }
            }

            async streamResponse(prompt, targetNode) {
                const stream = this.state.session.promptStreaming(prompt);
                let fullResponse = ''; let updateScheduled = false;

                for await (const chunk of stream) {
                    if (this.state.isAborted) break;
                    fullResponse += chunk; 
                    if (!updateScheduled) {
                        updateScheduled = true;
                        requestAnimationFrame(() => {
                            targetNode.innerHTML = this.parseMarkdown(fullResponse); 
                            targetNode.closest('.message-wrapper').dataset.rawText = fullResponse;
                            this.scrollToBottom(); this.updateContextBar();
                            updateScheduled = false;
                        });
                    }
                }
                requestAnimationFrame(() => {
                    targetNode.innerHTML = this.parseMarkdown(fullResponse);
                    targetNode.closest('.message-wrapper').dataset.rawText = fullResponse;
                    this.scrollToBottom(); this.updateContextBar();
                });
            }

            // ==========================================
            // EDIT & REGENERATE
            // ==========================================
            handleEditUserMessage(wrapper) {
                const rawText = wrapper.dataset.rawText;
                const textNode = wrapper.querySelector('.msg-text');
                textNode.innerHTML = `<textarea class="edit-area">${rawText}</textarea><button class="save-edit-btn">Ändern & Senden</button><button class="action-btn cancel-edit-btn" style="display:inline-block; margin-left:10px;">Abbrechen</button>`;
                const ta = textNode.querySelector('textarea'); ta.focus();
                
                textNode.querySelector('.save-edit-btn').onclick = async () => {
                    const newText = ta.value.trim();
                    if (!newText) return;
                    while (wrapper.nextSibling) wrapper.nextSibling.remove();
                    wrapper.remove(); 
                    this.dom.userInput.value = newText;
                    await this.connectToAI(true); 
                    this.handleSend();
                };
                textNode.querySelector('.cancel-edit-btn').onclick = () => textNode.textContent = rawText;
            }

            async handleRegenerateAI(wrapper) {
                let prev = wrapper.previousElementSibling;
                while (prev && !prev.classList.contains('wrapper-user')) prev = prev.previousElementSibling;
                if (!prev) return;
                const userPrompt = prev.dataset.rawText;
                while (prev.nextSibling) prev.nextSibling.remove();
                
                await this.connectToAI(true); 
                this.dom.userInput.value = userPrompt; 
                this.handleSend(true); 
            }

            // ==========================================
            // PARSER & SYNTAX
            // ==========================================
            parseMarkdown(text) {
                let html = text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                    return `<div class="code-wrap"><div class="code-header"><span>${lang || 'Code'}</span><div class="code-actions"><button class="action-btn code-copy">📋 Kopieren</button><button class="action-btn code-run" title="Sichere HTML/JS Sandbox">▶️ Ausführen</button></div></div><pre><code>${this.highlightSyntax(code)}</code></pre></div>`;
                });
                html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');
                html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
                html = html.replace(/\n\n/g, '</p><p>');
                return `<p>${html}</p>`;
            }
            
            highlightSyntax(code) {
                const tokenRegex = /(\/\/.*?$|\/\*[\s\S]*?\*\/)|(["'`])(?:(?=(\\?))\3.)*?\2|\b(\d+)\b|\b(const|let|var|function|class|import|export|return|if|else|for|while|async|await|try|catch|new|true|false|null|undefined|document|window)\b/gm;
                return code.replace(tokenRegex, (match, comment, quote, _, number, keyword) => {
                    if (comment) return `<span class="hl-comment">${match}</span>`;
                    if (quote) return `<span class="hl-string">${match}</span>`;
                    if (number) return `<span class="hl-number">${match}</span>`;
                    if (keyword) return `<span class="hl-keyword">${match}</span>`;
                    return match;
                });
            }

            // ==========================================
            // AUDIO & FILE HELPERS
            // ==========================================
            setupSpeechRecognition() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    this.recognition = new SpeechRecognition(); this.recognition.lang = 'de-DE';
                    this.recognition.onresult = (e) => { this.dom.userInput.value += (this.dom.userInput.value ? ' ' : '') + e.results[0][0].transcript; this.triggerInputResize(); };
                    this.recognition.onend = () => { this.state.isRecording = false; this.dom.micBtn.classList.remove('recording'); };
                    this.recognition.onerror = (e) => { this.state.isRecording = false; this.dom.micBtn.classList.remove('recording'); };
                } else this.dom.micBtn.style.display = 'none';
            }
            toggleMic() {
                if (!this.recognition) return;
                if (this.state.isRecording) this.recognition.stop(); 
                else { this.recognition.start(); this.state.isRecording = true; this.dom.micBtn.classList.add('recording'); }
            }
            toggleTTS(btn) {
                const isSpeaking = btn.dataset.speaking === "true"; window.speechSynthesis.cancel();
                document.querySelectorAll('.tts-btn').forEach(b => { b.innerHTML = '🔊 Vorlesen'; b.dataset.speaking = "false"; });
                if (isSpeaking) return;
                const utterance = new SpeechSynthesisUtterance(btn.closest('.message-wrapper').dataset.rawText.replace(/[*`_]/g, ''));
                utterance.lang = 'de-DE'; utterance.onend = () => { btn.innerHTML = '🔊 Vorlesen'; btn.dataset.speaking = "false"; };
                btn.innerHTML = '⏹ Stopp'; btn.dataset.speaking = "true"; window.speechSynthesis.speak(utterance);
            }
            handleFileDrop(file) {
                if (!file.name.match(/\.(txt|md|csv|json|html|js|css)$/i)) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    let content = e.target.result;
                    if (content.length > CONFIG.MAX_WEBPAGE_CHARS) content = content.substring(0, CONFIG.MAX_WEBPAGE_CHARS) + "\n... [Gekürzt]";
                    this.state.pendingFileContext = `Datei '${file.name}':\n\n${content}\n\n`;
                    this.addSysMessage(`✅ Datei '${file.name}' im Speicher.`); this.dom.userInput.focus();
                }; reader.readAsText(file);
            }
            async fetchWebpageText(url) {
                try {
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
                    const doc = new DOMParser().parseFromString((await response.json()).contents, 'text/html');
                    doc.querySelectorAll('script, style, nav, header, footer, iframe').forEach(el => el.remove());
                    let text = doc.body.textContent.replace(/\s+/g, ' ').trim();
                    return text.length > CONFIG.MAX_WEBPAGE_CHARS ? text.substring(0, CONFIG.MAX_WEBPAGE_CHARS) + "\n... [Gekürzt]" : text;
                } catch (e) { this.debug('WARN', 'Fetch Failed', e.message); return null; }
            }

            // ==========================================
            // UI BUILDER
            // ==========================================
            addSysMessage(text) {
                const msgDiv = document.createElement('div'); msgDiv.className = 'message sys-msg';
                if (text.length > 200) msgDiv.classList.add('sys-msg-context');
                msgDiv.textContent = text; this.dom.chatBox.appendChild(msgDiv);
                this.scrollToBottom(); this.updateContextBar(); this.saveSessionsToStorage();
            }
            addMessage(text, senderClass) {
                const wrapper = document.createElement('div'); wrapper.className = `message-wrapper ${senderClass === 'user-msg' ? 'wrapper-user' : 'wrapper-ai'}`;
                wrapper.dataset.rawText = text;
                const msgDiv = document.createElement('div'); msgDiv.className = `message ${senderClass}`;
                const textSpan = document.createElement('div'); textSpan.className = 'msg-text';
                
                if(senderClass === 'ai-msg') textSpan.innerHTML = this.parseMarkdown(text); else textSpan.textContent = text;
                msgDiv.appendChild(textSpan); wrapper.appendChild(msgDiv);

                const actionDiv = document.createElement('div'); actionDiv.className = 'msg-actions';
                if (senderClass === 'user-msg') actionDiv.innerHTML = `<button class="action-btn edit-btn">✏️ Bearbeiten</button>`;
                else if (senderClass === 'ai-msg') actionDiv.innerHTML = `<button class="action-btn copy-btn">📋 Kopieren</button><button class="action-btn tts-btn" data-speaking="false">🔊 Vorlesen</button><button class="action-btn regen-btn" title="Antwort neu generieren">🔄 Neu generieren</button>`;
                wrapper.appendChild(actionDiv);

                this.dom.chatBox.appendChild(wrapper);
                this.scrollToBottom(); this.updateContextBar();
                return textSpan; 
            }

            // ==========================================
            // EXPORT / IMPORT
            // ==========================================
            generateExportString() {
                let chatText = CONFIG.FILE_PREFIX + "\n";
                this.dom.chatBox.querySelectorAll('.message-wrapper, .sys-msg').forEach(w => {
                    if (w.classList.contains('sys-msg')) chatText += `\n${CONFIG.MARKERS.SYS}\n${w.textContent}\n`;
                    else chatText += `\n${w.classList.contains('wrapper-user') ? CONFIG.MARKERS.USR : CONFIG.MARKERS.AI}\n${w.dataset.rawText}\n`;
                }); return chatText;
            }
            exportChat() {
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([this.generateExportString()], { type: 'text/plain;charset=utf-8' }));
                a.download = `chat-export.txt`; a.click();
            }
            
            /**
             * Parst importierte Dateien robust Zeile für Zeile.
             * Performanz-Fix: Ersetzt fehleranfällige und inperformante Reguläre Ausdrücke.
             * @param {string} content - Rohtext der Datei.
             * @param {boolean} skipInit - Überspringt das Neustarten der KI nach dem Laden.
             */
            async loadFromString(content, skipInit = false) {
                const lines = content.replace(/\r\n/g, '\n').split('\n');
                if (!lines[0].startsWith(CONFIG.FILE_PREFIX)) return;

                this.dom.chatBox.innerHTML = '';
                if (this.state.session && typeof this.state.session.destroy === 'function') { try { this.state.session.destroy(); } catch (err) {} }
                this.state.session = null;

                let currentRole = null;
                let currentText = [];

                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line === CONFIG.MARKERS.USR || line === CONFIG.MARKERS.AI || line === CONFIG.MARKERS.SYS) {
                        if (currentRole) this.dispatchParsedMessage(currentRole, currentText.join('\n').trim());
                        currentRole = line === CONFIG.MARKERS.USR ? 'Du' : (line === CONFIG.MARKERS.AI ? 'KI' : 'System');
                        currentText = [];
                    } else {
                        if (currentRole) currentText.push(lines[i]); // Originalzeile (inkl. Leerzeichen)
                    }
                }
                if (currentRole) this.dispatchParsedMessage(currentRole, currentText.join('\n').trim());
                
                if (!skipInit) await this.connectToAI(true);
            }
            
            dispatchParsedMessage(role, text) {
                if (!text) return;
                if (role === 'System') this.addSysMessage(text);
                else if (role === 'Du') this.addMessage(text, 'user-msg');
                else if (role === 'KI') this.addMessage(text, 'ai-msg');
            }

            // ==========================================
            // EVENT BINDINGS
            // ==========================================
            bindEvents() {
                this.dom.exportLogBtn.addEventListener('click', () => this.exportLogs());
                if (this.dom.compressBtn) this.dom.compressBtn.addEventListener('click', () => this.compressHistory());
                document.getElementById('toggle-sidebar-btn').addEventListener('click', () => this.dom.sidebar.classList.toggle('hidden'));
                document.getElementById('toggle-settings-btn').addEventListener('click', () => this.dom.settingsPanel.style.display = this.dom.settingsPanel.style.display === 'block' ? 'none' : 'block');
                document.getElementById('sidebar-new-btn').addEventListener('click', () => this.createNewSession());
                document.getElementById('import-btn').addEventListener('click', () => this.dom.importFile.click());
                document.getElementById('export-btn').addEventListener('click', () => this.exportChat());
                this.dom.importFile.addEventListener('change', (e) => {
                    const file = e.target.files[0]; if (!file) return;
                    const r = new FileReader(); r.onload = async (ev) => { this.dom.chatBox.innerHTML=''; await this.loadFromString(ev.target.result); this.saveSessionsToStorage(); };
                    r.readAsText(file); e.target.value = ''; 
                });
                this.dom.sendBtn.addEventListener('click', () => this.handleSend());
                this.dom.stopBtn.addEventListener('click', () => this.state.isAborted = true);
                this.dom.micBtn.addEventListener('click', () => this.toggleMic());
                
                document.getElementById('quick-prompts').addEventListener('click', (e) => {
                    if (e.target.classList.contains('quick-btn')) {
                        const action = e.target.dataset.action; const currentVal = this.dom.userInput.value.trim();
                        this.dom.userInput.value = currentVal ? `Bitte "${action}":\n\n${currentVal}` : `Bitte "${action}": \n`;
                        if (currentVal) this.handleSend(); else this.dom.userInput.focus();
                    }
                });

                this.dom.chatBox.addEventListener('click', (e) => {
                    const t = e.target;
                    if (t.closest('.copy-btn')) { const btn = t.closest('.copy-btn'); navigator.clipboard.writeText(btn.closest('.message-wrapper').dataset.rawText); btn.innerHTML = '✅'; setTimeout(() => btn.innerHTML = '📋 Kopieren', 2000); }
                    else if (t.closest('.edit-btn')) this.handleEditUserMessage(t.closest('.message-wrapper'));
                    else if (t.closest('.regen-btn')) this.handleRegenerateAI(t.closest('.message-wrapper'));
                    else if (t.closest('.code-copy')) { const btn = t.closest('.code-copy'); navigator.clipboard.writeText(btn.closest('.code-wrap').querySelector('code').innerText); btn.innerHTML = '✅'; setTimeout(() => btn.innerHTML = '📋 Kopieren', 2000); }
                    else if (t.closest('.code-run')) {
                        const wrap = t.closest('.code-wrap'); let iframe = wrap.querySelector('.code-output-frame') || document.createElement('iframe');
                        if (!iframe.className) { iframe.className = 'code-output-frame'; iframe.sandbox = 'allow-scripts'; wrap.appendChild(iframe); }
                        iframe.style.display = 'block'; iframe.srcdoc = wrap.querySelector('code').innerText;
                    }
                    else if (t.closest('.tts-btn')) this.toggleTTS(t.closest('.tts-btn'));
                });

                this.dom.chatBox.addEventListener('scroll', () => this.state.isAutoScrollActive = (this.dom.chatBox.scrollHeight - this.dom.chatBox.clientHeight <= this.dom.chatBox.scrollTop + CONFIG.SCROLL_THRESHOLD));
                this.dom.userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!this.dom.userInput.disabled) this.handleSend(); } });
                this.dom.userInput.addEventListener('input', () => this.triggerInputResize());
                
                document.addEventListener('keydown', (e) => {
                    if (e.ctrlKey) {
                        switch(e.key.toLowerCase()) {
                            case 'd': e.preventDefault(); this.toggleDebugTerminal(); break;
                            case 'm': e.preventDefault(); this.toggleMic(); break;
                            case 'b': e.preventDefault(); this.dom.sidebar.classList.toggle('hidden'); break;
                            case 'l': e.preventDefault(); this.createNewSession(); break;
                            case 's': e.preventDefault(); this.exportChat(); break;
                            case 'o': e.preventDefault(); this.dom.importFile.click(); break;
                        }
                    }
                });

                const dropZone = document.body;
                dropZone.addEventListener('dragover', (e) => { e.preventDefault(); this.dom.dragOverlay.style.display = 'flex'; });
                dropZone.addEventListener('dragleave', (e) => { if (e.target === this.dom.dragOverlay) this.dom.dragOverlay.style.display = 'none'; });
                dropZone.addEventListener('drop', (e) => { e.preventDefault(); this.dom.dragOverlay.style.display = 'none'; if (e.dataTransfer.files.length > 0) this.handleFileDrop(e.dataTransfer.files[0]); });
            }
        }
        document.addEventListener('DOMContentLoaded', () => new AIChatApp());
    </script>
</body>
